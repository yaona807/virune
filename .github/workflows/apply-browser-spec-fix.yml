name: Apply browser specification mapping fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/stable-release-hardening
      - name: Preserve normative browser test mapping
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('integration/browser.test.ts')
          source = path.read_text()
          old = "test(`browser target executes emitted ESM in ${engine.name()}`, { timeout: 120_000 }, async () => {"
          new = "test('browser target executes emitted ESM in Chromium', { timeout: 120_000 }, async () => {"
          if old not in source:
              raise SystemExit('browser test title not found')
          path.write_text(source.replace(old, new))
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add integration/browser.test.ts
          git commit -m "test(browser): preserve normative test mapping"
          git push origin HEAD:agent/stable-release-hardening
