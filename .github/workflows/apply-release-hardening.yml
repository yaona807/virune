name: Apply release hardening patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/stable-release-hardening
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Decode and extract patch
        shell: bash
        run: |
          cat .github/patches/release-hardening.* | base64 --decode > /tmp/release-hardening.tar.gz
          gzip --test /tmp/release-hardening.tar.gz
          tar -xzf /tmp/release-hardening.tar.gz
      - name: Restore locked dependencies
        run: npm ci
      - name: Generate public ABI snapshot
        run: node scripts/verify-public-abi.mjs --write
      - name: Commit non-workflow implementation
        shell: bash
        run: |
          git checkout -- .github/workflows/release.yml
          rm -f .github/workflows/release-dry-run.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/stable-release-gate.json docs package.json packages/public-abi.snapshot.json scripts
          git diff --cached --stat
          git commit -m "release: enforce stable gate and public ABI"
          git push origin HEAD:agent/stable-release-hardening
