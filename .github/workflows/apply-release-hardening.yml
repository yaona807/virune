name: Apply release hardening patch

on:
  push:
    branches:
      - agent/stable-release-hardening

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/stable-release-hardening
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Apply verified release hardening patch
        shell: bash
        run: |
          cat .github/patches/release-hardening.* | base64 --decode > /tmp/release-hardening.tar.gz
          tar -xzf /tmp/release-hardening.tar.gz
          npm ci
          node scripts/verify-public-abi.mjs --write
          rm -rf .github/patches .github/workflows/apply-release-hardening.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "release: enforce stable gate and public ABI"
          git push origin HEAD:agent/stable-release-hardening
