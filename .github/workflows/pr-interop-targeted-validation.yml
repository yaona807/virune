name: PR interop targeted validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Typecheck and JS interop tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --silent
      - name: Typecheck all project references
        run: npm run check
      - name: Capture JavaScript interop tests
        id: interop
        shell: bash
        run: |
          set +e
          npm --workspace @virune/js-interop test > interop-tests.txt 2>&1
          status=$?
          cat interop-tests.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: interop-tests
          path: interop-tests.txt
          retention-days: 7
      - name: Fail when interop tests failed
        if: steps.interop.outputs.status != '0'
        run: exit 1
      - name: Run heap benchmark
        run: npm run benchmark:interop-heap
