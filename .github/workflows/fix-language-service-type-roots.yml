name: Fix TypeScript language service type roots

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/ts-language-service-reuse'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Resolve Node type roots from the provider installation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/js-interop/src/index.ts')
          text = path.read_text()
          old = """\t\tconst compilerOptions: ts.CompilerOptions = { ...this.#compilerOptions, types: platform === 'node' ? ['node'] : [] };
          \t\tconst virtualFiles = new Map<string, VirtualProbeFile>();"""
          new = """\t\tconst typeRoots = platform === 'node' ? nodeTypeRoots(this.#compilerOptions.typeRoots) : this.#compilerOptions.typeRoots;
          \t\tconst compilerOptions: ts.CompilerOptions = {
          \t\t\t...this.#compilerOptions,
          \t\t\ttypes: platform === 'node' ? ['node'] : [],
          \t\t\t...(typeRoots === undefined ? {} : { typeRoots }),
          \t\t};
          \t\tconst virtualFiles = new Map<string, VirtualProbeFile>();"""
          if old not in text:
              raise SystemExit('Probe compiler options block not found')
          text = text.replace(old, new, 1)

          marker = """function hash(value: string | NodeJS.ArrayBufferView): string {
          \treturn createHash('sha256').update(value).digest('hex');
          }
          """
          replacement = marker + """
          function nodeTypeRoots(configured: readonly string[] | undefined): readonly string[] | undefined {
          \tconst roots = new Set(configured ?? []);
          \ttry {
          \t\tconst packageJson = createRequire(import.meta.url).resolve('@types/node/package.json');
          \t\troots.add(dirname(dirname(packageJson)));
          \t} catch { /* Node declarations may be supplied by the project instead. */ }
          \treturn roots.size === 0 ? undefined : [...roots];
          }
          """
          if marker not in text:
              raise SystemExit('Hash helper marker not found')
          path.write_text(text.replace(marker, replacement, 1))
          PY
          git rm .github/workflows/fix-language-service-type-roots.yml
          git rm -f .github/workflows/pr-language-service-resolution-diagnostic.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/js-interop/src/index.ts
          git commit -m "fix(interop): resolve installed Node type declarations"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
