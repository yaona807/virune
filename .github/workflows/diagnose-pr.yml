name: PR typecheck diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript diagnostic
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Install dependencies quietly
        run: npm ci --silent >/dev/null
      - name: Capture type-check errors
        run: |
          set +e
          npm run check --silent > typecheck.log 2>&1
          echo "$?" > typecheck.status
          exit 0
      - name: Upload type-check errors
        uses: actions/upload-artifact@v7
        with:
          name: typecheck-errors
          path: |
            typecheck.log
            typecheck.status
      - name: Fail when type-checking failed
        run: exit "$(cat typecheck.status)"
