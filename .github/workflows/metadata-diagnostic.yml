name: Metadata diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run metadata checks
        shell: bash
        run: |
          set -o pipefail
          npm run verify:metadata 2>&1 | tee /tmp/metadata.log
      - name: Upload metadata diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: metadata-diagnostics
          path: /tmp/metadata.log
          if-no-files-found: error
          retention-days: 1
