name: Apply JS checked-result reuse patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/reuse-js-checked-results'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply checked-result reuse condition
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/compiler/src/project/project.ts')
          text = path.read_text()
          old = "\t\tconst hasJavaScriptImports = parsed.ast?.imports.some(item => item.sourceKind === 'javascript') === true;\n\t\tif (cached?.buildFingerprint === buildFingerprint && !hasJavaScriptImports) {"
          new = "\t\tif (cached?.buildFingerprint === buildFingerprint) {"
          if old not in text:
              raise SystemExit('Expected checked-result condition was not found')
          path.write_text(text.replace(old, new, 1))
          PY
          git rm .github/workflows/apply-js-reuse-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/compiler/src/project/project.ts
          git commit -m "perf(compiler): reuse checked JS import modules"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
