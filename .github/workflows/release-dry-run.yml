name: Release dry run

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/stable-release-gate.json'
      - '.github/workflows/release.yml'
      - '.github/workflows/release-dry-run.yml'
      - 'docs/release-channels*.md'
      - 'docs/runtime-abi*.md'
      - 'docs/stable-release-gate*.md'
      - 'package.json'
      - 'packages/*/package.json'
      - 'packages/public-abi.snapshot.json'
      - 'packages/runtime/src/**'
      - 'packages/js-interop/src/**'
      - 'packages/stdlib/src/**'
      - 'packages/compiler/src/codegen/runtime-imports.ts'
      - 'scripts/stable-release-gate*.mjs'
      - 'scripts/verify-documentation.mjs'
      - 'scripts/verify-public-abi*.mjs'
      - 'scripts/verify-release-channel.mjs'

permissions:
  contents: read
  actions: read

concurrency:
  group: release-dry-run-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Stable release gate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Execute production release path without publishing
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run release:gate
      - name: Upload release evidence and candidate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stable-release-dry-run-${{ github.sha }}
          path: |
            .cache/release/release-evidence.json
            release/
          if-no-files-found: error
          retention-days: 30
