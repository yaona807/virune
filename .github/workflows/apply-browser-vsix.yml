name: Apply browser and VSIX implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/stable-release-hardening
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Extract implementation
        shell: bash
        run: |
          cat .github/patches/browser-vsix.* | base64 --decode > /tmp/browser-vsix.tar.gz
          gzip --test /tmp/browser-vsix.tar.gz
          tar -xzf /tmp/browser-vsix.tar.gz
          python3 - <<'PY'
          from pathlib import Path
          path = Path('integration/browser.test.ts')
          source = path.read_text()
          source = source.replace("const module = await import('virune_app_main');", "const applicationSpecifier = 'virune_app_main';\n\t\t\t\tconst module = await import(applicationSpecifier);")
          path.write_text(source)
          PY
      - name: Update locked dependencies
        run: npm install --save-dev --save-exact playwright@1.61.1 @vscode/test-electron@3.0.0
      - name: Build project
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/browser-vsix-build.log
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-vsix-build-diagnostics
          path: /tmp/browser-vsix-build.log
          if-no-files-found: ignore
          retention-days: 1
      - name: Verify Chromium conformance
        run: npm run test:browser-conformance:built
        env:
          VIRUNE_BROWSER_ENGINE: chromium
          VIRUNE_BROWSER_ARTIFACT_DIR: .cache/browser/chromium
      - name: Package VSIX
        run: npm run pack:vscode
      - name: Verify installed VSIX
        shell: bash
        run: |
          set -o pipefail
          xvfb-run -a npm run smoke:vscode-release 2>&1 | tee /tmp/vsix-smoke.log
      - name: Upload VSIX smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vsix-smoke-diagnostics
          path: /tmp/vsix-smoke.log
          if-no-files-found: ignore
          retention-days: 1
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add integration/browser.test.ts package.json package-lock.json scripts/vsix-smoke.mjs scripts/vsix-smoke-suite.mjs scripts/vsix-smoke-harness
          git commit -m "test: add browser matrix and installed VSIX smoke"
          git push origin HEAD:agent/stable-release-hardening
