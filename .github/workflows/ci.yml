name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 24
          - os: windows-latest
            node: 24
          - os: macos-latest
            node: 24
          - os: ubuntu-latest
            node: 26
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify runtime, metadata and specification
        run: npm run verify:metadata

      - name: Type-check project references
        run: npm run check

      - name: Run unit and integration tests
        run: npm test

      - name: Verify TypeScript binding corpus
        run: npm run test:binding-corpus

      - name: Upload binding corpus diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: binding-corpus-${{ runner.os }}-node-${{ matrix.node }}
          path: |
            .cache/binding-corpus/report.current.json
            .cache/binding-corpus/generated/
            .cache/binding-corpus/package-lock.json
            .cache/binding-corpus/baseline-diff.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Run fuzz smoke suite
        run: npm run test:fuzz:smoke

      - name: Verify VS Code extension and language server
        run: npm run test:vscode

      - name: Run conformance suite
        run: npm run test:conformance

      - name: Verify formatter output
        run: npm run fmt:check

      - name: Run source clone smoke test
        run: npm run smoke:clone

      - name: Package and verify release artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        run: npm run verify:release

      - name: Upload release artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        uses: actions/upload-artifact@v7
        with:
          name: virune-release-node-24
          path: release/
          if-no-files-found: error
          retention-days: 14
