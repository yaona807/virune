name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Core (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Ubuntu 24.04 / Node.js 24
            os: ubuntu-24.04
            node: 24
            full: true
            experimental: false
          - label: Windows Server 2022 / Node.js 24
            os: windows-2022
            node: 24
            full: false
            experimental: false
          - label: Windows Server 2025 / Node.js 24
            os: windows-2025
            node: 24
            full: false
            experimental: true
          - label: macOS 14 / Node.js 24
            os: macos-14
            node: 24
            full: false
            experimental: false
          - label: Ubuntu 24.04 / Node.js 26
            os: ubuntu-24.04
            node: 26
            full: false
            experimental: false
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify runtime, metadata and specification
        run: npm run verify:metadata

      - name: Build and type-check project references
        run: npm run check

      - name: Run platform-independent unit and integration tests
        run: node scripts/run-tests.mjs --exclude-browser --failure-output-only

      - name: Upload unit test failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-failure-${{ matrix.os }}-node-${{ matrix.node }}
          path: .cache/unit-test-failure.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Verify TypeScript binding corpus
        if: matrix.full
        run: npm run test:binding-corpus:built

      - name: Upload binding corpus diagnostics
        if: always() && matrix.full
        uses: actions/upload-artifact@v7
        with:
          name: binding-corpus-${{ runner.os }}-node-${{ matrix.node }}
          path: |
            .cache/binding-corpus/report.current.json
            .cache/binding-corpus/generated/
            .cache/binding-corpus/package-lock.json
            .cache/binding-corpus/baseline-diff.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Run fuzz smoke suite
        if: matrix.full
        run: npm run test:fuzz:smoke:built

      - name: Run semantic differential fuzz smoke
        if: matrix.full
        run: npm run test:semantic-fuzz-policy && npm run test:semantic-fuzz:smoke:built
        env:
          VIRUNE_SEMANTIC_FUZZ_ITERATIONS: 12
          VIRUNE_SEMANTIC_FUZZ_ARTIFACT_DIR: fuzz-regressions/semantic-artifacts/smoke

      - name: Upload semantic fuzz diagnostics
        if: always() && matrix.full
        uses: actions/upload-artifact@v7
        with:
          name: semantic-fuzz-smoke-${{ runner.os }}-node-${{ matrix.node }}
          path: fuzz-regressions/semantic-artifacts/smoke
          if-no-files-found: ignore
          retention-days: 30

      - name: Verify VS Code extension and language server
        run: npm run test:vscode:built

      - name: Run conformance suite
        run: npm run test:conformance:built

      - name: Verify formatter output
        run: npm run fmt:check:built

      - name: Run source clone smoke test
        run: npm run smoke:clone:built

  browser:
    name: Browser runtime (Ubuntu 24.04 / Node.js 24)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build project references
        run: npm run check
      - name: Execute emitted ESM in Chromium
        run: npm run test:integration:browser:built

  release-artifacts:
    name: Release artifacts
    needs: [verify, browser]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Package and verify release artifacts
        run: npm run verify:release
      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: virune-release-node-24
          path: release/
          if-no-files-found: error
          retention-days: 14
