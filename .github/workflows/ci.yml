name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 24
          - os: windows-latest
            node: 24
          - os: macos-latest
            node: 24
          - os: ubuntu-latest
            node: 26
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run pack:virune
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
      - run: npm run pack:vscode
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
