name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Verify release tag matches package version
        shell: bash
        run: |
          expected="v$(node -p 'require("./package.json").version')"
          test "$GITHUB_REF_NAME" = "$expected" || { echo "Expected tag $expected, got $GITHUB_REF_NAME" >&2; exit 1; }
      - name: Install dependencies
        run: npm ci
      - name: Execute stable release gate
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run release:gate
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-${{ github.ref_name }}
          path: .cache/release/release-evidence.json
          if-no-files-found: error
          retention-days: 90
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; stable assets are immutable." >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" release/* --generate-notes --verify-tag
