name: PR interop heap diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  heap:
    name: Interop heap benchmark
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Run bounded heap benchmark
        run: npm run benchmark:interop-heap > interop-heap.txt
      - uses: actions/upload-artifact@v7
        with:
          name: interop-heap
          path: interop-heap.txt
          retention-days: 7
