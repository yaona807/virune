name: Source snapshot

on:
  pull_request:
    paths:
      - '**'

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/upload-artifact@v7
        with:
          name: virune-source-snapshot
          path: .
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
