name: Apply TypeScript language service reuse patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/ts-language-service-reuse'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Reuse one Language Service per project generation and platform
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/js-interop/src/index.ts')
          text = path.read_text()

          text = text.replace(
          """export interface TypeScriptInteropProviderOptions {
          \treadonly projectRoot: string;
          \treadonly compilerOptions?: ts.CompilerOptions;
          \treadonly providerId?: string;
          \treadonly generation?: number;
          }""",
          """export interface TypeScriptInteropProviderOptions {
          \treadonly projectRoot: string;
          \treadonly compilerOptions?: ts.CompilerOptions;
          \treadonly providerId?: string;
          \treadonly generation?: number;
          \treadonly createLanguageService?: (host: ts.LanguageServiceHost) => ts.LanguageService;
          }""",
          1)

          probe_marker = """interface Probe {
          \treadonly program: ts.Program;
          \treadonly checker: ts.TypeChecker;
          \treadonly sourceFile: ts.SourceFile;
          \treadonly valueNode?: ts.Node;
          \treadonly typeNode?: ts.TypeNode;
          \treadonly resolvedModule?: ts.ResolvedModuleFull;
          }
          """
          probe_replacement = probe_marker + """
          interface VirtualProbeFile {
          \treadonly path: string;
          \treadonly text: string;
          \treadonly version: number;
          }

          interface ProbeWorkspace {
          \treadonly compilerOptions: ts.CompilerOptions;
          \treadonly virtualFiles: Map<string, VirtualProbeFile>;
          \treadonly languageService: ts.LanguageService;
          \tprojectVersion: number;
          }
          """
          if probe_marker not in text:
              raise SystemExit('Probe interface marker not found')
          text = text.replace(probe_marker, probe_replacement, 1)

          field_marker = """\treadonly #projectRoot: string;
          \treadonly #compilerOptions: ts.CompilerOptions;
          \treadonly #types = new Map<string, StoredType>();
          \t#nextTypeId = 1;"""
          field_replacement = """\treadonly #projectRoot: string;
          \treadonly #compilerOptions: ts.CompilerOptions;
          \treadonly #createLanguageService: (host: ts.LanguageServiceHost) => ts.LanguageService;
          \treadonly #workspaces = new Map<JsImportRequest['platform'], ProbeWorkspace>();
          \treadonly #types = new Map<string, StoredType>();
          \t#nextTypeId = 1;"""
          if field_marker not in text:
              raise SystemExit('Provider field marker not found')
          text = text.replace(field_marker, field_replacement, 1)

          constructor_marker = """\t\t\t...options.compilerOptions,
          \t\t};
          \t}

          \tpublic resolveImport"""
          constructor_replacement = """\t\t\t...options.compilerOptions,
          \t\t};
          \t\tthis.#createLanguageService = options.createLanguageService ?? (host => ts.createLanguageService(host));
          \t}

          \tpublic dispose(): void {
          \t\tthis.#types.clear();
          \t\tfor (const workspace of this.#workspaces.values()) workspace.languageService.dispose();
          \t\tthis.#workspaces.clear();
          \t}

          \tpublic resolveImport"""
          if constructor_marker not in text:
              raise SystemExit('Constructor marker not found')
          text = text.replace(constructor_marker, constructor_replacement, 1)

          start = text.index("\tprivate createProbe(request: JsImportRequest): Probe {")
          end = text.index("\n\tprivate store(", start)
          replacement = """\tprivate createProbe(request: JsImportRequest): Probe {
          \t\tconst workspace = this.probeWorkspace(request.platform);
          \t\tconst virtualPath = join(dirname(request.containingFile), `.virune-interop-${hash(`${request.moduleSpecifier}:${request.kind}:${request.importedName ?? ''}`)}.ts`);
          \t\tconst moduleText = JSON.stringify(request.moduleSpecifier);
          \t\tconst sourceText = request.kind === 'named'
          \t\t\t? `import { ${safeTsName(request.importedName ?? '')} as __viruneValue } from ${moduleText};\n__viruneValue;`
          \t\t\t: request.kind === 'default' ? `import __viruneValue from ${moduleText};\n__viruneValue;`
          \t\t\t\t: request.kind === 'namespace' ? `import * as __viruneValue from ${moduleText};\n__viruneValue;`
          \t\t\t\t\t: request.kind === 'type-only' ? `import type { ${safeTsName(request.importedName ?? '')} as __ViruneType } from ${moduleText};\ntype __ViruneAlias = __ViruneType;`
          \t\t\t\t\t\t: `import ${moduleText};`;
          \t\tconst virtualFileKey = canonicalFilePath(virtualPath);
          \t\tconst existing = workspace.virtualFiles.get(virtualFileKey);
          \t\tif (existing?.text !== sourceText) {
          \t\t\tworkspace.virtualFiles.set(virtualFileKey, { path: virtualPath, text: sourceText, version: (existing?.version ?? 0) + 1 });
          \t\t\tworkspace.projectVersion++;
          \t\t}
          \t\tconst program = workspace.languageService.getProgram();
          \t\tif (program === undefined) throw new Error('TypeScript interop language service did not create a program');
          \t\tconst diagnostics = [
          \t\t\t...workspace.languageService.getCompilerOptionsDiagnostics(),
          \t\t\t...workspace.languageService.getSyntacticDiagnostics(virtualPath),
          \t\t\t...workspace.languageService.getSemanticDiagnostics(virtualPath),
          \t\t];
          \t\tconst errors = diagnostics.filter(item => item.category === ts.DiagnosticCategory.Error);
          \t\tif (errors.length > 0) throw new Error(errors.map(item => ts.flattenDiagnosticMessageText(item.messageText, '\n')).join('; '));
          \t\tconst sourceFile = program.getSourceFile(virtualPath)
          \t\t\t?? program.getSourceFiles().find(item => canonicalFilePath(item.fileName) === virtualFileKey);
          \t\tif (sourceFile === undefined) throw new Error('TypeScript interop probe was not created');
          \t\tconst checker = program.getTypeChecker();
          \t\tconst expression = sourceFile.statements.find(ts.isExpressionStatement)?.expression;
          \t\tconst alias = sourceFile.statements.find(ts.isTypeAliasDeclaration)?.type;
          \t\tconst resolved = ts.resolveModuleName(request.moduleSpecifier, virtualPath, workspace.compilerOptions, ts.sys).resolvedModule;
          \t\treturn { program, checker, sourceFile, ...(expression === undefined ? {} : { valueNode: expression }), ...(alias === undefined ? {} : { typeNode: alias }), ...(resolved === undefined ? {} : { resolvedModule: resolved }) };
          \t}

          \tprivate probeWorkspace(platform: JsImportRequest['platform']): ProbeWorkspace {
          \t\tconst existing = this.#workspaces.get(platform);
          \t\tif (existing !== undefined) return existing;
          \t\tconst compilerOptions: ts.CompilerOptions = { ...this.#compilerOptions, types: platform === 'node' ? ['node'] : [] };
          \t\tconst virtualFiles = new Map<string, VirtualProbeFile>();
          \t\tlet workspace!: ProbeWorkspace;
          \t\tconst host: ts.LanguageServiceHost = {
          \t\t\tgetCompilationSettings: () => compilerOptions,
          \t\t\tgetScriptFileNames: () => [...virtualFiles.values()].map(file => file.path),
          \t\t\tgetScriptVersion: fileName => String(virtualFiles.get(canonicalFilePath(fileName))?.version ?? 0),
          \t\t\tgetScriptSnapshot: fileName => {
          \t\t\t\tconst text = virtualFiles.get(canonicalFilePath(fileName))?.text ?? ts.sys.readFile(fileName);
          \t\t\t\treturn text === undefined ? undefined : ts.ScriptSnapshot.fromString(text);
          \t\t\t},
          \t\t\tgetProjectVersion: () => String(workspace.projectVersion),
          \t\t\tgetCurrentDirectory: () => this.#projectRoot,
          \t\t\tgetDefaultLibFileName: options => ts.getDefaultLibFilePath(options),
          \t\t\tfileExists: ts.sys.fileExists,
          \t\t\treadFile: ts.sys.readFile,
          \t\t\treadDirectory: ts.sys.readDirectory,
          \t\t\tuseCaseSensitiveFileNames: () => ts.sys.useCaseSensitiveFileNames,
          \t\t\tgetNewLine: () => ts.sys.newLine,
          \t\t\t...(ts.sys.directoryExists === undefined ? {} : { directoryExists: ts.sys.directoryExists }),
          \t\t\t...(ts.sys.getDirectories === undefined ? {} : { getDirectories: ts.sys.getDirectories }),
          \t\t\t...(ts.sys.realpath === undefined ? {} : { realpath: ts.sys.realpath }),
          \t\t};
          \t\tconst languageService = this.#createLanguageService(host);
          \t\tworkspace = { compilerOptions, virtualFiles, languageService, projectVersion: 0 };
          \t\tthis.#workspaces.set(platform, workspace);
          \t\treturn workspace;
          \t}
          """
          text = text[:start] + replacement + text[end:]
          path.write_text(text)
          PY
          git rm .github/workflows/apply-language-service-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/js-interop/src/index.ts
          git commit -m "perf(interop): reuse TypeScript language services"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
