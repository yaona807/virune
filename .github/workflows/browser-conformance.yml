name: Browser conformance

on:
  schedule:
    - cron: '43 4 * * 2'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/browser-conformance.yml'
      - 'integration/browser.test.ts'
      - 'packages/compiler/**'
      - 'packages/runtime/**'
      - 'packages/stdlib/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

concurrency:
  group: browser-conformance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  browser:
    name: ${{ matrix.engine }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        engine: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install browser engine
        run: npx playwright install --with-deps ${{ matrix.engine }}
      - run: npm run build
      - name: Run browser runtime conformance
        run: npm run test:browser-conformance:built
        env:
          VIRUNE_BROWSER_ENGINE: ${{ matrix.engine }}
          VIRUNE_PLAYWRIGHT_MANAGED: 'true'
          VIRUNE_BROWSER_ARTIFACT_DIR: .cache/browser/${{ matrix.engine }}
      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-conformance-${{ matrix.engine }}
          path: .cache/browser/${{ matrix.engine }}
          if-no-files-found: warn
          retention-days: 30
