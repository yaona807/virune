name: Fix TypeScript language service type root typing

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/ts-language-service-reuse'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Return mutable compiler option arrays
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/js-interop/src/index.ts')
          text = path.read_text()
          old = "function nodeTypeRoots(configured: readonly string[] | undefined): readonly string[] | undefined {"
          new = "function nodeTypeRoots(configured: readonly string[] | undefined): string[] | undefined {"
          if old not in text:
              raise SystemExit('nodeTypeRoots signature not found')
          path.write_text(text.replace(old, new, 1))
          PY
          git rm .github/workflows/fix-language-service-type-root-types.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/js-interop/src/index.ts
          git commit -m "fix(interop): use mutable type root options"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
