name: Apply PR 29 rebase

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout rebased branch
        uses: actions/checkout@v6
        with:
          ref: agent/semantic-differential-fuzz
          path: current
      - name: Checkout preserved semantic fuzz implementation
        uses: actions/checkout@v6
        with:
          ref: 21777a187bfcb82dab6a2ff5835946a9be13522d
          path: previous
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: current/package-lock.json
      - name: Restore semantic fuzz implementation
        working-directory: current
        shell: bash
        run: |
          cp ../previous/scripts/semantic-fuzz.mjs scripts/semantic-fuzz.mjs
          cp ../previous/scripts/semantic-fuzz.test.mjs scripts/semantic-fuzz.test.mjs
          node <<'NODE'
          const fs = require('node:fs');
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const additions = {
            'test:semantic-fuzz-policy': 'node --test scripts/semantic-fuzz.test.mjs',
            'test:semantic-fuzz:smoke:built': 'node scripts/semantic-fuzz.mjs',
            'test:semantic-fuzz:smoke': 'npm run build && npm run test:semantic-fuzz:smoke:built',
            'test:semantic-fuzz:long': 'npm run build && node scripts/semantic-fuzz.mjs',
          };
          const scripts = {};
          for (const [name, command] of Object.entries(packageJson.scripts)) {
            scripts[name] = command;
            if (name === 'test:fuzz:long') Object.assign(scripts, additions);
          }
          packageJson.scripts = scripts;
          fs.writeFileSync('package.json', `${JSON.stringify(packageJson, null, '\t')}\n`);
          NODE
      - name: Install dependencies
        working-directory: current
        run: npm ci
      - name: Validate semantic fuzz implementation
        working-directory: current
        shell: bash
        run: |
          node --check scripts/semantic-fuzz.mjs
          npm run test:semantic-fuzz-policy
          npm run build
          VIRUNE_SEMANTIC_FUZZ_ITERATIONS=12 VIRUNE_SEMANTIC_FUZZ_ARTIFACT_DIR=fuzz-regressions/semantic-artifacts/rebase npm run test:semantic-fuzz:smoke:built
      - name: Upload semantic fuzz diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pr29-rebase-semantic-fuzz-diagnostics
          path: current/fuzz-regressions/semantic-artifacts/rebase
          if-no-files-found: ignore
          retention-days: 7
      - name: Commit rebased implementation
        working-directory: current
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json scripts/semantic-fuzz.mjs scripts/semantic-fuzz.test.mjs
          git commit -m "test: restore semantic differential fuzz on current main"
          git push origin HEAD:agent/semantic-differential-fuzz
