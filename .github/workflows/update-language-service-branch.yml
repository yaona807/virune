name: Update language service branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.head.ref == 'agent/ts-language-service-reuse'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Merge current main and remove this workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          git rm .github/workflows/update-language-service-branch.yml
          git commit -m "chore: remove language service branch update workflow"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
