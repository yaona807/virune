name: PR LSP diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostic:
    name: LSP benchmark and interop inspection
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Run LSP completion benchmark
        run: npm run benchmark:lsp > lsp-benchmark.txt
      - name: Inspect compiler checked-result reuse
        shell: bash
        run: |
          grep -R -n -E 'reusedCheckedModules|requiresJavaScriptInitialization|jsInteropProvider|checkedModules' packages/compiler/src > compiler-interop-search.txt || true
          while IFS=: read -r file _; do
            [ -f "$file" ] && printf '\n===== %s =====\n' "$file" && cat "$file"
          done < <(cut -d: -f1 compiler-interop-search.txt | sort -u) > compiler-interop-context.txt
      - uses: actions/upload-artifact@v7
        with:
          name: lsp-diagnostic
          path: |
            lsp-benchmark.txt
            compiler-interop-search.txt
            compiler-interop-context.txt
          retention-days: 7
